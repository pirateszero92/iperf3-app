services:
  backend:
    build:
      context: ./server
    ports:
      - "8001:8000"
    volumes:
      - history_data:/app/data
    restart: unless-stopped
    cap_add:
      - NET_RAW
      - NET_ADMIN
    networks:
      - iperf3-net

  frontend:
    build:
      context: ./client
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - iperf3-net
    restart: unless-stopped

volumes:
  history_data:

networks:
  iperf3-net:
    driver: bridge
